name: CD - Deploy to Google Cloud Run

on:
    workflow_run:
        workflows:
        - CI - Build and Test
        types:
        - completed
        branches:
        - main

    workflow_dispatch:

jobs:
  stage_1_validate_ci_result:
    name: Stage 1 - Validate CI Result
    runs-on: ubuntu-latest

    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Confirm CI Success
        run: echo "CI completed successfully. Starting CD pipeline."

  stage_2_build_and_push_image:
    name: Stage 2 - Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: stage_1_validate_ci_result

    permissions:
      contents: read
      id-token: write

    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Authenticate to Google Cloud with WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Define Docker Image Name
        id: image
        run: |
          IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPOSITORY }}/inventory-app:${{ github.sha }}"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "Docker image: $IMAGE"

      - name: Build Docker Image
        run: |
          docker build -t "${{ steps.image.outputs.image }}" .

      - name: Push Docker Image to Artifact Registry
        run: |
          docker push "${{ steps.image.outputs.image }}"

  stage_3_deploy_to_cloud_run:
    name: Stage 3 - Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: stage_2_build_and_push_image

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud with WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Application to Cloud Run
        run: |
          gcloud run deploy inventory-app \
            --image "${{ needs.stage_2_build_and_push_image.outputs.image }}" \
            --platform managed \
            --region ${{ secrets.GCP_REGION }} \
            --allow-unauthenticated \
            --port 8080 \
            --set-env-vars MONGO_URI="${{ secrets.MONGO_URI }}",JWT_SECRET="${{ secrets.JWT_SECRET }}"