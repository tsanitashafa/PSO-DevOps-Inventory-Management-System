name: CD - Deploy to Google Cloud Run

run-name: ${{ github.event_name == 'workflow_dispatch' && 'CD - Manual Deploy' || format('CD - {0}', github.event.workflow_run.display_title) }} by @${{ github.actor }}

on:
  workflow_run:
    workflows:
      - CI - Build and Test
    types:
      - completed
    branches:
      - main

  workflow_dispatch:

env:
  IMAGE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  stage_1_validate_ci_result:
    name: Stage 1 - Validate CI Result
    runs-on: ubuntu-latest

    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Confirm CI Success
        run: echo "CI completed successfully. Starting CD pipeline."

  stage_2_build_and_push_image:
    name: Stage 2 - Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: stage_1_validate_ci_result

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.IMAGE_SHA }}

      - name: Authenticate to Google Cloud with WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Image
        run: |
          IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPOSITORY }}/inventory-app:${{ env.IMAGE_SHA }}"
          echo "Building image: $IMAGE"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

  stage_3_deploy_to_cloud_run:
    name: Stage 3 - Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: stage_2_build_and_push_image

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud with WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPOSITORY }}/inventory-app:${{ env.IMAGE_SHA }}"
          echo "Deploying image: $IMAGE"
          gcloud run deploy inventory-app \
            --image "$IMAGE" \
            --platform managed \
            --region ${{ secrets.GCP_REGION }} \
            --allow-unauthenticated \
            --port 8080 \
            --set-env-vars MONGO_URI="${{ secrets.MONGO_URI }}",JWT_SECRET="${{ secrets.JWT_SECRET }}"
